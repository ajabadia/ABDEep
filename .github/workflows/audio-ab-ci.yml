name: Audio A/B CI Pipeline

on:
  workflow_dispatch:
    inputs:
      run_comparison:
        description: "Run Acoustical A/B Comparisons and upload results"
        required: false
        default: "true"
  pull_request:
    paths:
      - "Source/Calibration/**"
      - "WebUI/schemas/audio-ab-comparison.schema.v2.0.0.json"
      - "WebUI/tests/audioABSchema.contract.test.js"
      - ".github/workflows/audio-ab-ci.yml"
  push:
    branches:
      - main
    paths:
      - "Source/Calibration/**"
      - "WebUI/schemas/audio-ab-comparison.schema.v2.0.0.json"
      - "WebUI/tests/audioABSchema.contract.test.js"
      - ".github/workflows/audio-ab-ci.yml"

permissions:
  contents: read

concurrency:
  group: audio-ab-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test-acoustic:
    name: Build & Test Acoustic Validation
    runs-on: windows-2022
    timeout-minutes: 30

    env:
      CI: true
      AUDIO_AB_OUTPUT_DIR: artifacts/audio-ab

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DDEEP_TARGET_MODEL=0

      - name: Build C++ Unit Tests
        run: |
          cmake --build build --config Release --target ABDEep_UnitTests

      - name: Run Native C++ Acoustical Tests
        run: |
          .\build\ABDEep_UnitTests_artefacts\Release\ABDEep_UnitTests.exe -t
        continue-on-error: true # Permite archivar resultados aun si hay fallos heredados en FX

      - name: Run WebUI Vitest Suite
        run: |
          npm run test:ci

      - name: Verify Audio A/B Comparison Schema Contract
        run: |
          npx vitest run WebUI/tests/audioABSchema.contract.test.js --reporter=verbose

      - name: Archive Audio A/B artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audio-ab-runs-${{ github.run_id }}
          path: |
            artifacts/audio-ab/
            WebUI/schemas/audio-ab-comparison.schema.v2.0.0.json
          if-no-files-found: ignore
          retention-days: 14
