name: DSP C++ CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "Source/**"
      - "CMakeLists.txt"
      - "build.bat"
      - ".github/workflows/dsp-ci.yml"
  push:
    branches:
      - main
    paths:
      - "Source/**"
      - "CMakeLists.txt"
      - "build.bat"
      - ".github/workflows/dsp-ci.yml"

permissions:
  contents: read

concurrency:
  group: dsp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Run C++ Unit Tests
    runs-on: windows-2022
    timeout-minutes: 30

    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Configure CMake (model 2 — Enhanced, full test coverage)
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DDEEP_TARGET_MODEL=2

      - name: Build Unit Tests target
        run: |
          cmake --build build --config Release --target ABDEep_UnitTests

      - name: Run C++ Unit Tests
        run: |
          .\build\ABDEep_UnitTests_artefacts\Release\ABDEep_UnitTests.exe
        continue-on-error: true
